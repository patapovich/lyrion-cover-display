[lms]
# --- Required ---------------------------------------------------------------
# Hostname or IP of your Lyrion Music Server (LMS runs elsewhere on the network).
server_host =
# LMS web/JSON-RPC port (the normal web UI port, NOT the 9090 CLI port).
server_port = 9000

# Which player to follow. Use the player's MAC address (recommended) or its
# name. Leave blank to follow the first connected player.
# Run `python3 lms_cover_display.py --list-players` to discover MACs.
player =

# Track SEVERAL players and show one at a time. List MACs (or names) in PRIORITY
# order, highest first, comma- or space-separated. When set, this supersedes
# `player`. All listed players are polled each tick (one status request each):
#   - while any are playing, the highest-priority playing one is shown (a
#     higher-priority player starting playback preempts immediately);
#   - when none are playing, the screen sticks with the player that played most
#     recently (following its pause/stop/power-off and idle/HDMI-off timers).
# Example:
#   players = aa:bb:cc:dd:ee:01, aa:bb:cc:dd:ee:02
players =

# --- Display / behavior -----------------------------------------------------
# Updates are event-driven: the app holds a persistent connection to the LMS
# command-line interface (port 9090) and reacts instantly to play/pause/stop/
# power/connect notifications — no constant polling. poll_interval is only the
# FALLBACK sweep interval used while that event socket is down (it reconnects
# automatically). event_heartbeat is a safety re-sync while the socket is up.
poll_interval = 1.0
cli_port = 9090
# Only set these if your LMS has CLI authentication enabled (most don't):
cli_user =
cli_pass =
event_heartbeat = 30.0

# Cover size requested from LMS (server-side resize, keeps aspect ratio).
# 1000 suits a 1536px-tall panel while staying light on RAM/CPU.
cover_px = 1000

# How long the system may sit idle before the panel rests. Counts the time since
# playback stopped (the last cover is held until then) and also the time with no
# player connected ("waiting for player…"). With power_blank_enabled (below) that
# physically powers the HDMI output off; otherwise it just fills the screen black.
# (Set low, e.g. 10, while testing.)
idle_blank_seconds = 300

# Overlay text timing for the *centered* layout (info_height = 0): show the
# artist/title for this many seconds after a track change, then fade out.
# Ignored in the stacked portrait layout (info band is always shown).
text_show_seconds = 8

# Fade-out duration (seconds) for the artist/title overlay in the centered
# layout, once text_show_seconds elapses.
text_fade_seconds = 0.6

# Treat "pause" like "stop" for the blank timer (false = paused stays lit).
blank_on_pause = false

# Background behind the cover:
# "blur" = the cover scaled to fill, saturated + heavily blurred + zoomed + dark-
# tinted (lms-material now-playing style); "black" = solid dark fill.
background = blur

# Rotate the rendered image (the framebuffer stays landscape; we compose and
# rotate in software so the panel can be mounted in portrait). 0 | 90 | 180 | 270.
# If the picture comes out upside-down, switch 90 <-> 270.
rotate = 90

# Layout selector. >0 = "stacked": the cover is shown as a 1:1 square filling the
# canvas width at the top, with artist/track/album in the band below it. In the
# portrait mount the band height is derived from the geometry (canvas height minus
# the square), so the exact value here only chooses stacked vs centered — any
# positive number behaves the same. Set 0 for the legacy centered layout (cover
# centered, text fades out after a track change).
info_height = 0.30

# How strongly to wash out (darken) the background *under* the info band, on top
# of the normal background veil. 0-255; higher = more washed out. Kept low so the
# blurred, saturated cover backdrop stays visible behind the text.
info_wash = 70

# Show the album name next to the artist in the overlay.
show_album = true

# HTTP request timeout in seconds.
request_timeout = 5.0

# --- HDMI power ------------------------------------------------------------- #
# When the panel rests (player stopped past idle_blank_seconds, or the player is
# powered off), physically power the HDMI output OFF instead of just filling the
# screen black. Saves power and panel life. The cold HDMI scaler re-locks slowly
# (~8-9s) on wake, so 'off' is reserved for genuine idle; the wake path repaints
# the splash before the signal returns. Set false to keep the legacy behavior
# (never drop HDMI; just black-fill the screen).
power_blank_enabled = true

# Shell commands to power the HDMI output off / on. The defaults use vcgencmd
# (the firmware/legacy-graphics way, which works with this firmware-framebuffer
# setup). Run best-effort; failures are logged and non-fatal. Leave a value
# blank to disable that direction.
hdmi_off_cmd = vcgencmd display_power 0
hdmi_on_cmd = vcgencmd display_power 1
# Reads the current HDMI power state at startup (output ending in 0 or 1) so a
# service restart while the panel is resting can tell HDMI is off and wake it,
# instead of assuming it's on. Leave blank to always assume on at startup.
hdmi_query_cmd = vcgencmd display_power

# Grace period (seconds) after the LMS player reports power=0 before HDMI is
# dropped, so a quick power off/on doesn't make the slow scaler re-lock.
hdmi_off_grace = 10.0

# Server/wifi outage handling: when LMS becomes unreachable while a cover is up,
# hold the last frame this long before switching to the "connecting…" screen, so
# brief blips are invisible. A *sustained* outage past idle_blank_seconds (above)
# rests the panel like idle; it wakes again when LMS returns.
unreachable_grace = 15.0
